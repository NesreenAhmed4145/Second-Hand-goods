<div class="register-container">
  <h2>Create Account</h2>
  
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" formControlName="username" class="form-control" placeholder="Enter full name">
      <div *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" class="text-danger">
        Name is required (min 3 chars).
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" formControlName="email" class="form-control" placeholder="name@example.com">
      <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="text-danger">
        Please enter a valid email.
      </div>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" formControlName="phone" class="form-control" placeholder="01xxxxxxxxx">
      
      <div *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched" class="text-danger">
        <small *ngIf="registerForm.get('phone')?.errors?.['required']">Phone number is required.</small>
        <small *ngIf="registerForm.get('phone')?.errors?.['pattern']">Must be 11 digits.</small>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" class="form-control" placeholder="******">
      <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="text-danger">
        Password must be at least 6 characters.
      </div>
    </div>

    <button type="submit" [disabled]="registerForm.invalid">Register</button>
  </form>

  <p>Already have an account? <a routerLink="/login">Login here</a></p>
</div>
